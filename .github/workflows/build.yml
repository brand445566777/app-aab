name: Generate Play Store AAB

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Remove Wrong Auto-Generated Keystore
        run: rm -f android/app/debug.keystore

      - name: Decode Authentic Keystore File
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/debug.keystore

      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      - name: Force Clean Cache
        run: |
          cd android
          ./gradlew clean

      - name: Build Authentic Production Bundle (AAB)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Upload Verified AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-app-release
          path: android/app/build/outputs/bundle/release/*.aab
