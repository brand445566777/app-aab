name: Android Release Build

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Generate Native Android Code
      run: npx expo prebuild

    - name: Decode Android Keystore File
      run: |
        mkdir -p android/app
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/production.keystore

    - name: Verify and Print SHA Fingerprints
      run: |
        echo "=== FETCHING SHA FINGERPRINTS FROM PRODUCTION KEYSTORE ==="
        keytool -list -v \
          -keystore android/app/production.keystore \
          -alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
          -storepass "${{ secrets.ANDROID_KEY_PASSWORD }}"

    - name: Grant Execute Permission for Gradlew
      run: chmod +x android/gradlew

    - name: Build Android App Bundle (AAB)
      run: |
        cd android
        ./gradlew clean
        ./gradlew bundleRelease --no-build-cache --rerun-tasks \
          -Pandroid.injected.signing.store.file=$(pwd)/app/production.keystore \
          -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

    - name: Upload Production Artifact (.AAB)
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/bundle/release/app-release.aab