# Memory limit ko bilkul minimal rakhin taake crash na ho
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=256m

# Parallel processing ko band karein taake step-by-step sukoon se build bane
org.gradle.parallel=false

# Background daemon server ko disable karein taake memory occupied na rahe
org.gradle.daemon=false

# Android target platforms configuration
android.useAndroidX=true
android.enableJetifier=true

expo.inlineModules.watchedDirectories=[]
android.minSdkVersion=24
android.compileSdkVersion=35
android.targetSdkVersion=35
android.kotlinVersion=2.1.20